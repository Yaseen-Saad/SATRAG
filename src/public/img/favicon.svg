<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Dark Background -->
  <rect width="64" height="64" rx="14" fill="#090D16"/>

  <!-- Inactive Progress Track Ring -->
  <circle cx="32" cy="32" r="21" stroke="#1E293B" stroke-width="5"/>

  <!-- Active SAT Progress Arc (Green) -->
  <path d="M 32 11 A 21 21 0 1 1 11 32" stroke="#3FCF8E" stroke-width="5" stroke-linecap="round"/>

  <!-- RAG Context Brackets [ ] (Adjusted Bounds to Avoid Any Ring Collision) -->
  <!-- Left Bracket -->
  <path d="M 22 23 H 19.5 V 41 H 22" stroke="#38BDF8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right Bracket -->
  <path d="M 42 23 H 44.5 V 41 H 42" stroke="#38BDF8" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Ultra-Clear Center "S" Text -->
  <text x="32" y="41" 
        font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-weight="900" 
        font-size="25" 
        fill="#FFFFFF" 
        text-anchor="middle">S</text>
</svg>
